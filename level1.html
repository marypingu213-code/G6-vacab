<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第一關：部件拼拼樂</title>
    <script src="data.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; background-color: #eef2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        
        /* 📱 平板自適應高度 */
        .canvas-16-9 { width: 100%; max-width: 1400px; min-height: 85vh; background-color: #fdf5e6; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); display: flex; flex-direction: column; align-items: center; padding: 3% 3% 4% 3%; box-sizing: border-box; position: relative; }
        
        .header-area { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2%; }
        h1 { color: #e74c3c; font-size: 28px; margin: 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .back-btn { background-color: #fff; color: #5a4a42; text-decoration: none; font-size: 18px; font-weight: bold; padding: 10px 20px; border-radius: 50px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s; z-index: 50; }
        .back-btn:hover { background-color: #f0f0f0; transform: scale(1.05); }
        
        .target-hint { font-size: 24px; color: #2c3e50; background: #fff; padding: 8px 30px; border-radius: 50px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; margin-bottom: 3%; }
        
        .game-wrapper { display: flex; justify-content: center; align-items: flex-start; flex-wrap: wrap; gap: 3vw; width: 100%; flex-grow: 1; }
        
        .box { width: 350px; height: 380px; background: #fff; border-radius: 20px; position: relative; box-shadow: 0 8px 16px rgba(0,0,0,0.05); }
        .parts-pool { border: 4px dashed #d2b48c; } .drop-zone { border: 4px solid #ff9999; }
        
        .box-title { width: 100%; padding: 10px 0; text-align: center; font-size: 20px; font-weight: bold; position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }
        .pool-title { background: #f4e8d8; color: #7b6855; } .zone-title { background: #ff9999; color: #fff; }
        
        #pool { display: flex; flex-wrap: wrap; align-content: flex-start; justify-content: center; padding-top: 60px; height: 100%; box-sizing: border-box; }
        
        /* 🌟 核心：touch-action: none 防止拖曳時畫面捲動 */
        .part-img { width: 130px; height: 130px; object-fit: contain; cursor: grab; transition: transform 0.1s ease; z-index: 10; touch-action: none; }
        #pool .part-img { position: relative !important; left: auto !important; top: auto !important; margin: 8px; background-color: #fdfdfd; border: 2px solid #eaeaea; border-radius: 12px; }
        .part-img:active { cursor: grabbing; transform: scale(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        #zone-guide { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: #ecd5d5; font-weight: bold; pointer-events: none; width: 80%; text-align: center; }
        
        .status-area { min-height: 80px; display: flex; justify-content: center; align-items: center; gap: 2vw; margin-top: 20px; width: 100%; }
        #message { font-size: 24px; color: #ff6347; font-weight: bold; margin: 0; }
        
        #next-btn { font-size: 24px; padding: 15px 40px; background-color: #4CAF50; color: white; border: none; border-radius: 50px; cursor: pointer; display: none; box-shadow: 0 6px 0 #388e3c; font-weight: bold; }
        #next-btn:active { transform: translateY(6px); box-shadow: none; }
    </style>
</head>
<body>
    <div class="canvas-16-9">
        <div class="header-area">
            <h1>🧩 第一關：部件拼拼樂</h1>
            <a href="#" id="back-btn" class="back-btn">🏠 回課程大廳</a>
        </div>
        <div class="target-hint">目標：<span id="target-word" style="color: #e74c3c;">字</span></div>
        <div class="game-wrapper">
            <div class="box parts-pool" id="pool"><div class="box-title pool-title">1️⃣ 點住並拖曳</div></div>
            <div class="box drop-zone" id="zone"><div class="box-title zone-title">2️⃣ 放到這裡組裝</div><p id="zone-guide">把部件丟進來</p></div>
        </div>
        <div class="status-area"><div id="message"></div><button id="next-btn" onclick="nextWord()">我拼好了 ➡️</button></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('id') || "1"; 
        document.getElementById('back-btn').href = `lesson.html?id=${lessonId}`;
        const wordData = allLessonsData[lessonId] ? allLessonsData[lessonId].level1 : [];

        let gameWords = [], currentIdx = 0, placedCount = 0;
        let activePart = null, offsetX = 0, offsetY = 0;

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex); currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            } return array;
        }

        function startGame() { 
            if(wordData.length === 0) { alert("此課程沒有第一關資料！"); return; }
            gameWords = shuffle([...wordData]); currentIdx = 0; initGame(); 
        }

        function initGame() {
            const pool = document.getElementById('pool'), targetWord = document.getElementById('target-word'), msg = document.getElementById('message'), guide = document.getElementById('zone-guide'), nextBtn = document.getElementById('next-btn');
            document.querySelectorAll('.part-img').forEach(img => img.remove());
            msg.innerText = ''; nextBtn.style.display = 'none'; nextBtn.innerText = '我拼好了 ➡️'; nextBtn.onclick = nextWord;
            placedCount = 0; guide.style.display = 'block';
            let data = gameWords[currentIdx]; targetWord.innerText = data.word;
            let shuffledParts = [...data.parts].sort(() => Math.random() - 0.5);
            
            shuffledParts.forEach((src) => {
                let img = document.createElement('img'); img.src = src; img.className = 'part-img'; 
                img.draggable = false; // 停用原生的拖曳，改用全觸控設計
                
                // 🌟 綁定觸控與滑鼠的通用事件
                img.addEventListener('pointerdown', handlePointerDown);
                img.onerror = function() { console.error("圖片遺失: " + src); }; 
                pool.appendChild(img);
            });
        }

        // 🌟 全自由拖曳核心邏輯
        function handlePointerDown(e) {
            e.preventDefault();
            activePart = this;
            activePart.style.zIndex = 1000;
            activePart.setPointerCapture(e.pointerId);

            let rect = activePart.getBoundingClientRect();
            
            if (activePart.parentElement.id === 'pool') {
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
                activePart.style.position = 'fixed';
                activePart.style.left = rect.left + 'px';
                activePart.style.top = rect.top + 'px';
                document.body.appendChild(activePart);
            } else if (activePart.parentElement.id === 'zone') {
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
            }

            activePart.addEventListener('pointermove', handlePointerMove);
            activePart.addEventListener('pointerup', handlePointerUp);
        }

        function handlePointerMove(e) {
            if (!activePart) return;
            e.preventDefault();
            
            if (activePart.parentElement === document.body) {
                activePart.style.left = (e.clientX - offsetX) + 'px';
                activePart.style.top = (e.clientY - offsetY) + 'px';
            } else if (activePart.parentElement.id === 'zone') {
                let zoneRect = document.getElementById('zone').getBoundingClientRect();
                let newLeft = e.clientX - zoneRect.left - offsetX;
                let newTop = e.clientY - zoneRect.top - offsetY;
                activePart.style.left = newLeft + 'px';
                activePart.style.top = newTop + 'px';
            }
        }

        function handlePointerUp(e) {
            if (!activePart) return;
            activePart.releasePointerCapture(e.pointerId);
            activePart.removeEventListener('pointermove', handlePointerMove);
            activePart.removeEventListener('pointerup', handlePointerUp);
            activePart.style.zIndex = 10;

            let zone = document.getElementById('zone');
            let zoneRect = zone.getBoundingClientRect();
            let pool = document.getElementById('pool');

            // 判斷是否丟進粉紅色組裝區
            let droppedInZone = ( e.clientX >= zoneRect.left && e.clientX <= zoneRect.right && e.clientY >= zoneRect.top && e.clientY <= zoneRect.bottom );

            if (droppedInZone) {
                if (activePart.parentElement === document.body) {
                    zone.appendChild(activePart);
                    document.getElementById('zone-guide').style.display = 'none';
                    placedCount++;
                }
                activePart.style.position = 'absolute';
                let newLeft = e.clientX - zoneRect.left - offsetX;
                let newTop = e.clientY - zoneRect.top - offsetY;
                activePart.style.left = newLeft + 'px';
                activePart.style.top = newTop + 'px';
                
                checkWin();
            } else {
                if (activePart.parentElement === zone) placedCount--;
                pool.appendChild(activePart);
                activePart.style.position = 'relative';
                activePart.style.left = 'auto';
                activePart.style.top = 'auto';
                
                if (placedCount < gameWords[currentIdx].parts.length) { 
                    document.getElementById('message').innerText = ''; 
                    document.getElementById('next-btn').style.display = 'none'; 
                }
                if (document.querySelectorAll('#zone .part-img').length === 0) {
                    document.getElementById('zone-guide').style.display = 'block';
                }
            }
            activePart = null;
        }
        
        function checkWin() { if (placedCount === gameWords[currentIdx].parts.length) { document.getElementById('message').innerText = "🌟 請檢查拼得對不對喔！ 🌟"; document.getElementById('next-btn').style.display = 'inline-block'; } }
        
        function nextWord() { 
            currentIdx++; 
            if (currentIdx < gameWords.length) { 
                initGame(); 
            } else { 
                document.getElementById('message').style.color = "#2ecc71";
                document.getElementById('message').innerText = "🎉 恭喜！本關卡挑戰成功！"; 
                let btn = document.getElementById('next-btn');
                btn.innerText = '🏠 回課程大廳';
                btn.onclick = () => { window.location.href = `lesson.html?id=${lessonId}`; };
            } 
        }
        
        window.onload = startGame;
    </script>
</body>
</html>
